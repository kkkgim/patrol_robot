<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patrol Robot Control</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;height:100vh;display:flex}

  /* Sidebar */
  .sidebar{width:260px;background:#1f2430;color:#fff;padding:20px;display:flex;flex-direction:column;gap:20px}
  .title{font-size:20px;font-weight:bold;color:#7aa2ff}
  .status-box{background:#2b3245;border-radius:10px;padding:15px;text-align:center}
  .status-label{font-size:11px;color:#aaa;margin-bottom:8px}
  .status-value{font-size:22px;font-weight:bold}
  .conn{font-size:12px;margin-top:8px;color:#bbb}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#e53935;margin-right:6px}
  .connected .dot{background:#4caf50}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;padding:20px;gap:20px}
  .map{flex:1;background:#fff;border-radius:12px;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:14px}

  /* Control panel */
  .panel{width:320px;padding:20px 20px 20px 0;display:flex;flex-direction:column;gap:20px}
  .card{background:#fff;border-radius:12px;padding:18px;border:1px solid #e5e5e5}
  .section{font-size:13px;font-weight:bold;margin-bottom:12px;color:#444}

  .btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  button{padding:14px;border:none;border-radius:8px;color:#fff;font-weight:bold;cursor:pointer}
  .start{background:#4caf50}
  .home{background:#2196f3}
  .stop{background:#f44336;grid-column:span 2}
  button:disabled{opacity:.5;cursor:not-allowed}

  .log{background:#111;color:#0f0;font-family:monospace;font-size:12px;height:200px;overflow-y:auto;padding:12px;border-radius:8px}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="title">PATROL ROS2</div>

  <div class="status-box" id="connWrap">
    <div class="status-label">ROBOT STATUS</div>
    <div class="status-value" id="robotStatus">UNKNOWN</div>
    <div class="conn"><span class="dot"></span><span id="connText">DISCONNECTED</span></div>
  </div>
</aside>

<main class="main">
  <div class="map">Map stream / RViz image here</div>
</main>

<section class="panel">
  <div class="card">
    <div class="section">Manual Control</div>
    <div class="btns">
      <button class="start" onclick="sendCommand('START_PATROL')">Start Patrol</button>
      <button class="home" onclick="sendCommand('RETURN_HOME')">Return Home</button>
      <button class="stop" onclick="sendCommand('STOP')">STOP</button>
    </div>
  </div>

  <div class="card">
    <div class="section">System Log</div>
    <div class="log" id="log"></div>
  </div>
</section>

<script>
let ws=null;let reconnectTimer=null;

function log(msg){
  const el=document.getElementById('log');
  const t=new Date().toLocaleTimeString();
  el.innerHTML+=`[${t}] ${msg}<br>`;
  el.scrollTop=el.scrollHeight;
}

function setConnection(connected){
  const wrap=document.getElementById('connWrap');
  const text=document.getElementById('connText');
  if(connected){wrap.classList.add('connected');text.textContent='CONNECTED'}
  else{wrap.classList.remove('connected');text.textContent='DISCONNECTED'}
}

function updateStatus(status){
  const el=document.getElementById('robotStatus');
  el.textContent=status;
  const colors={IDLE:'#9e9e9e',PATROL_STARTED:'#4caf50',RETURN_HOME:'#2196f3',STOPPED:'#f44336',COMPLETED:'#2e7d32',FAILED:'#c62828',CANCELLED:'#ff9800'};
  el.style.color=colors[status]||'#7aa2ff';
}

function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen=()=>{log('WebSocket connected');setConnection(true);clearInterval(reconnectTimer)};

  ws.onmessage=(e)=>{
    const data=JSON.parse(e.data);
    if(data.type==='status_update'){updateStatus(data.status);log(`${data.status}`)}
  };

  ws.onclose=()=>{
    setConnection(false);
    log('connection lost... reconnecting');
    reconnectTimer=setInterval(connect,3000);
  };
}

async function sendCommand(cmd){
  log(`send: ${cmd}`);
  try{
    const r=await fetch(`/api/command/${cmd}`,{method:'POST'});
    const j=await r.json();
    log(j.success?`ok: ${j.message}`:`fail: ${j.message}`);
  }catch(e){log('request error')}
}

window.onload=()=>{connect();log('ui ready')};
window.onbeforeunload=()=>{if(ws)ws.close()};
</script>

</body>
</html>
